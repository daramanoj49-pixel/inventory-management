apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-app
  template:
    metadata:
      labels:
        app: inventory-app
    spec:
      containers:
        - name: inventory-app
          image: inventory-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 5001
          env:
            - name: MONGO_URI
              value: "mongodb://mongo:27017"
            - name: MONGO_DB
              value: "inventorydb"
            - name: ES_HOST
              value: "http://elasticsearch:9200"
            - name: ES_INDEX
              value: "products"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-app
spec:
  type: NodePort
  selector:
    app: inventory-app
  ports:
    - port: 5001
      targetPort: 5001
      nodePort: 30051